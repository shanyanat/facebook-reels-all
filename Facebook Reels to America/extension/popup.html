<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { font-family: system-ui, sans-serif; width: 100%; min-width: 320px; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; }

    header { background: #1a1a2e; padding: 12px 16px; border-bottom: 1px solid #333; flex-shrink: 0; }
    header h1 { font-size: 14px; color: #7eb3ff; letter-spacing: 0.5px; }
    header small { color: #666; font-size: 11px; }

    #controls { display: flex; gap: 8px; padding: 10px 16px; border-bottom: 1px solid #222; flex-shrink: 0; }
    button { flex: 1; padding: 8px 12px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    #btn-images { background: #2563eb; color: #fff; }
    #btn-videos { background: #16a34a; color: #fff; }
    #btn-stop   { background: #7f1d1d; color: #fca5a5; flex: 0 0 auto; padding: 8px 10px; }
    #btn-reload { background: #374151; color: #e0e0e0; flex: 0 0 auto; padding: 8px 10px; }

    #project-list { max-height: 260px; overflow-y: auto; flex-shrink: 0; }
    .project-row { padding: 10px 16px; border-bottom: 1px solid #1e1e1e; cursor: pointer; }
    .project-row:hover { background: #1a1a1a; }
    .project-row.selected { background: #1e2a40; border-left: 3px solid #2563eb; }
    .proj-id { font-size: 13px; font-weight: 600; color: #e0e0e0; }
    .proj-meta { font-size: 11px; color: #888; margin-top: 2px; }
    .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; margin-left: 8px; }
    .badge-pending    { background: #374151; color: #9ca3af; }
    .badge-storyboard_done { background: #1e3a5f; color: #60a5fa; }
    .badge-images_done { background: #1a3a2a; color: #4ade80; }
    .badge-videos_in_progress { background: #3d2a00; color: #fb923c; }
    .badge-complete   { background: #14532d; color: #86efac; }
    .badge-error      { background: #450a0a; color: #f87171; }

    #char-section { padding: 8px 16px; border-bottom: 1px solid #222; font-size: 11px; color: #888; flex-shrink: 0; }
    #char-section label { color: #aaa; }
    #char-input { display: none; }
    #char-label { color: #60a5fa; cursor: pointer; text-decoration: underline; margin-left: 6px; }
    #char-name { margin-left: 6px; color: #86efac; }

    #log { background: #080808; padding: 8px 12px; flex: 1; min-height: 200px; overflow-y: auto; font-family: monospace; font-size: 10px; color: #4ade80; border-top: 1px solid #222; }
    .log-entry { margin-bottom: 2px; }
    .log-err { color: #f87171; }
  </style>
</head>
<body>
  <header>
    <h1>FB Reels Automation</h1>
    <small id="header-status">Loading projects…</small>
  </header>

  <div id="controls">
    <button id="btn-images" disabled>▶ Images</button>
    <button id="btn-videos" disabled>▶ Videos</button>
    <button id="btn-stop" title="Stop all automations and reset project to pending">⏹</button>
    <button id="btn-reload" title="Reload project list">↺</button>
  </div>

  <div id="char-section">
    Character Sheet:
    <span id="char-name">none</span>
    <label id="char-label" for="char-input">Change</label>
    <input id="char-input" type="file" accept="image/png,image/jpeg">
  </div>

  <div id="project-list"></div>
  <div id="log"></div>

  <script src="popup.js"></script>
</body>
</html>
